<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TaskFlow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #F3F4FB;
    --surface: #FFFFFF;
    --ink: #1A1C33;
    --ink-soft: #6E7191;
    --ink-faint: #A6A9C4;
    --border: #E7E8F5;

    --navy: #171933;
    --navy-2: #21244A;

    --indigo: #5B5FEF;
    --indigo-dark: #4245C4;
    --magenta: #EF4D8B;
    --amber: #FFB020;
    --teal: #12B886;
    --sky: #2FB4E8;
    --violet: #9B5DE5;
    --rose: #F0426B;

    --radius: 14px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    font-family: 'Inter', sans-serif;
    color: var(--ink);
  }

  .app {
    display: grid;
    grid-template-columns: 260px 1fr;
    min-height: 100vh;
  }

  /* ---------- SIDEBAR ---------- */
  .sidebar {
    background: linear-gradient(180deg, var(--navy) 0%, var(--navy-2) 100%);
    color: #fff;
    padding: 28px 20px;
    display: flex;
    flex-direction: column;
    gap: 30px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .brand-mark {
    width: 32px;
    height: 32px;
    border-radius: 9px;
    background: conic-gradient(from 200deg, var(--indigo), var(--magenta), var(--amber), var(--teal), var(--indigo));
    flex-shrink: 0;
  }

  .brand-name {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 19px;
    letter-spacing: -0.02em;
  }

  .side-section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    margin-bottom: 10px;
  }

  .list-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    border-radius: 9px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    color: rgba(255,255,255,0.75);
    transition: background 0.15s ease, color 0.15s ease;
    position: relative;
  }

  .list-row:hover { background: rgba(255,255,255,0.06); color: #fff; }
  .list-row.active { background: rgba(255,255,255,0.1); color: #fff; }

  .list-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .list-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .list-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: rgba(255,255,255,0.35);
  }

  .list-del {
    display: none;
    background: none;
    border: none;
    color: rgba(255,255,255,0.4);
    cursor: pointer;
    font-size: 13px;
    padding: 2px 4px;
  }
  .list-row:hover .list-del { display: inline-block; }
  .list-del:hover { color: var(--rose); }

  .add-list-form {
    display: flex;
    gap: 6px;
    margin-top: 6px;
  }

  .add-list-form input {
    flex: 1;
    min-width: 0;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    color: #fff;
    font-size: 13px;
    padding: 7px 9px;
    outline: none;
  }
  .add-list-form input::placeholder { color: rgba(255,255,255,0.35); }
  .add-list-form input:focus { border-color: var(--indigo); }

  .add-list-form button {
    background: rgba(255,255,255,0.1);
    border: none;
    color: #fff;
    border-radius: 8px;
    padding: 0 12px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 600;
  }
  .add-list-form button:hover { background: var(--indigo); }

  .priority-filters { display: flex; flex-direction: column; gap: 4px; }

  .pf-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 9px;
    cursor: pointer;
    font-size: 13px;
    color: rgba(255,255,255,0.65);
    background: transparent;
    border: none;
    text-align: left;
    font-family: inherit;
    width: 100%;
  }
  .pf-row:hover { background: rgba(255,255,255,0.06); }
  .pf-row.active { background: rgba(255,255,255,0.1); color: #fff; }

  .pf-bar { width: 4px; height: 16px; border-radius: 3px; flex-shrink: 0; }

  .sidebar-footer {
    margin-top: auto;
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    font-family: 'JetBrains Mono', monospace;
  }

  /* ---------- MAIN ---------- */
  .main {
    padding: 36px 44px 60px;
    max-width: 920px;
  }

  .topbar {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 28px;
  }

  .topbar h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin: 0;
  }

  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 26px;
    gap: 20px;
    flex-wrap: wrap;
  }

  .progress-card {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 20px;
    box-shadow: 0 2px 10px rgba(30,32,70,0.04);
  }

  .ring-wrap { position: relative; width: 54px; height: 54px; flex-shrink: 0; }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: var(--border); stroke-width: 6; }
  .ring-fg {
    fill: none;
    stroke: url(#ringGradient);
    stroke-width: 6;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.5s cubic-bezier(.4,0,.2,1);
  }
  .ring-pct {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--ink);
  }

  .progress-stats { display: flex; flex-direction: column; gap: 2px; }
  .progress-stats .big { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 15px; }
  .progress-stats .small { font-size: 12px; color: var(--ink-soft); }

  .search-add {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 22px;
    box-shadow: 0 2px 10px rgba(30,32,70,0.04);
  }

  .search-row {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
  }

  .search-row input[type="text"].search {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    background: var(--bg);
  }
  .search-row input[type="text"].search:focus { border-color: var(--indigo); background: #fff; }

  .task-form {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .task-form input[type="text"] {
    flex: 1;
    min-width: 180px;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
  }
  .task-form input[type="text"]:focus { border-color: var(--indigo); }

  .task-form select,
  .task-form input[type="date"] {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 10px;
    font-size: 13px;
    font-family: inherit;
    color: var(--ink-soft);
    background: #fff;
    outline: none;
  }
  .task-form select:focus, .task-form input[type="date"]:focus { border-color: var(--indigo); }

  .btn-primary {
    background: var(--indigo);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s ease;
  }
  .btn-primary:hover { background: var(--indigo-dark); }

  .filter-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .tabs { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 3px; }
  .tab {
    border: none;
    background: transparent;
    padding: 7px 14px;
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    color: var(--ink-soft);
    border-radius: 8px;
    cursor: pointer;
  }
  .tab.active { background: var(--ink); color: #fff; }

  .sort-select {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 10px;
    font-size: 13px;
    font-family: inherit;
    color: var(--ink-soft);
    background: var(--surface);
    outline: none;
  }

  .task-list { display: flex; flex-direction: column; gap: 8px; }

  .task {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 4px solid var(--ink-faint);
    border-radius: 10px;
    padding: 13px 16px;
    transition: box-shadow 0.15s ease, transform 0.15s ease, opacity 0.2s ease;
  }
  .task:hover { box-shadow: 0 4px 16px rgba(30,32,70,0.07); transform: translateY(-1px); }
  .task.done { opacity: 0.55; }
  .task.p-high { border-left-color: var(--magenta); }
  .task.p-med { border-left-color: var(--amber); }
  .task.p-low { border-left-color: var(--teal); }

  .task-check {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1.5px solid var(--ink-faint);
    background: none;
    cursor: pointer;
    flex-shrink: 0;
    position: relative;
    padding: 0;
  }
  .task-check.checked { background: var(--teal); border-color: var(--teal); }
  .task-check svg {
    position: absolute; inset: 0; width: 100%; height: 100%;
    stroke: #fff; stroke-width: 2.5; fill: none;
    stroke-dasharray: 20; stroke-dashoffset: 20;
    transition: stroke-dashoffset 0.25s ease;
  }
  .task-check.checked svg { stroke-dashoffset: 0; }

  .task-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }

  .task-text {
    font-size: 14.5px;
    font-weight: 500;
    color: var(--ink);
    word-break: break-word;
  }
  .task.done .task-text { text-decoration: line-through; color: var(--ink-soft); }

  .task-text-input {
    font-size: 14.5px;
    font-weight: 500;
    font-family: inherit;
    border: none;
    border-bottom: 1px solid var(--indigo);
    outline: none;
    padding: 0;
    width: 100%;
    background: transparent;
    color: var(--ink);
  }

  .task-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  .chip {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }

  .chip-list { background: var(--bg); color: var(--ink-soft); }
  .chip-due { background: #EEF1FF; color: var(--indigo-dark); font-family: 'JetBrains Mono', monospace; }
  .chip-overdue { background: #FDECEF; color: var(--rose); font-family: 'JetBrains Mono', monospace; }
  .chip-priority-high { background: #FDEEF4; color: var(--magenta); }
  .chip-priority-med { background: #FFF6E5; color: #B9780A; }
  .chip-priority-low { background: #E7F9F2; color: #0C8F65; }

  .task-actions { display: flex; gap: 2px; opacity: 0; transition: opacity 0.15s ease; }
  .task:hover .task-actions, .task:focus-within .task-actions { opacity: 1; }

  .icon-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 14px;
    padding: 6px 8px;
    border-radius: 7px;
    color: var(--ink-soft);
  }
  .icon-btn:hover { background: var(--bg); color: var(--ink); }
  .icon-btn.delete:hover { color: var(--rose); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-soft);
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: var(--radius);
  }
  .empty-state .emoji { font-size: 32px; margin-bottom: 10px; }
  .empty-state .title { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 16px; color: var(--ink); margin-bottom: 4px; }
  .empty-state .sub { font-size: 13px; }

  .list-footer {
    display: flex;
    justify-content: flex-end;
    margin-top: 16px;
  }

  .clear-link {
    background: none;
    border: none;
    color: var(--rose);
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  .clear-link:disabled { color: var(--ink-faint); cursor: default; }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }

  @media (max-width: 800px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { flex-direction: row; overflow-x: auto; align-items: center; padding: 16px 20px; }
    .sidebar > div { flex-shrink: 0; }
    .main { padding: 26px 20px 50px; }
  }
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute">
  <defs>
    <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5B5FEF" />
      <stop offset="55%" stop-color="#EF4D8B" />
      <stop offset="100%" stop-color="#FFB020" />
    </linearGradient>
  </defs>
</svg>

<div class="app">

  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark"></div>
      <div class="brand-name">TaskFlow</div>
    </div>

    <div>
      <div class="side-section-label">Lists</div>
      <div id="lists-container"></div>
      <form class="add-list-form" id="add-list-form">
        <input type="text" id="new-list-input" placeholder="New list…" maxlength="20">
        <button type="submit" aria-label="Add list">+</button>
      </form>
    </div>

    <div>
      <div class="side-section-label">Priority</div>
      <div class="priority-filters" id="priority-filters">
        <button class="pf-row active" data-priority="all"><span class="pf-bar" style="background:var(--ink-faint)"></span>All priorities</button>
        <button class="pf-row" data-priority="high"><span class="pf-bar" style="background:var(--magenta)"></span>High</button>
        <button class="pf-row" data-priority="med"><span class="pf-bar" style="background:var(--amber)"></span>Medium</button>
        <button class="pf-row" data-priority="low"><span class="pf-bar" style="background:var(--teal)"></span>Low</button>
      </div>
    </div>

    <div class="sidebar-footer">In-session storage — resets on reload</div>
  </aside>

  <main class="main">
    <div class="header-row">
      <div class="topbar">
        <h1 id="view-title">All tasks</h1>
      </div>
      <div class="progress-card">
        <div class="ring-wrap">
          <svg width="54" height="54" viewBox="0 0 54 54">
            <circle class="ring-bg" cx="27" cy="27" r="22"></circle>
            <circle class="ring-fg" id="ring-fg" cx="27" cy="27" r="22" stroke-dasharray="138.2" stroke-dashoffset="138.2"></circle>
          </svg>
          <div class="ring-pct" id="ring-pct">0%</div>
        </div>
        <div class="progress-stats">
          <div class="big" id="stat-done">0 of 0 done</div>
          <div class="small" id="stat-open">0 open</div>
        </div>
      </div>
    </div>

    <div class="search-add">
      <div class="search-row">
        <input type="text" class="search" id="search-input" placeholder="Search tasks…">
      </div>
      <form class="task-form" id="task-form">
        <input type="text" id="task-input" placeholder="Add a task and press Enter…" maxlength="200" required>
        <select id="task-list-select"></select>
        <select id="task-priority-select">
          <option value="med">Medium priority</option>
          <option value="high">High priority</option>
          <option value="low">Low priority</option>
        </select>
        <input type="date" id="task-due-input">
        <button type="submit" class="btn-primary">Add task</button>
      </form>
    </div>

    <div class="filter-bar">
      <div class="tabs" id="status-tabs">
        <button class="tab active" data-status="all">All</button>
        <button class="tab" data-status="active">Active</button>
        <button class="tab" data-status="completed">Completed</button>
      </div>
      <select class="sort-select" id="sort-select">
        <option value="priority">Sort: Priority</option>
        <option value="due">Sort: Due date</option>
        <option value="alpha">Sort: A–Z</option>
        <option value="newest">Sort: Newest first</option>
      </select>
    </div>

    <div class="task-list" id="task-list"></div>
    <div class="empty-state" id="empty-state" style="display:none;">
      <div class="emoji">✨</div>
      <div class="title">Nothing here</div>
      <div class="sub">Add a task above, or clear your filters to see more.</div>
    </div>

    <div class="list-footer">
      <button class="clear-link" id="clear-completed">Clear completed tasks</button>
    </div>
  </main>

</div>

<script>
  // ---------- STATE ----------
  const listPalette = ['#5B5FEF', '#EF4D8B', '#FFB020', '#12B886', '#2FB4E8', '#9B5DE5'];
  let listColorIndex = 0;

  let lists = [
    { id: 'inbox', name: 'Inbox', color: '#5B5FEF', deletable: false },
    { id: 'work', name: 'Work', color: '#EF4D8B', deletable: true },
    { id: 'personal', name: 'Personal', color: '#12B886', deletable: true },
  ];
  listColorIndex = 3;

  let taskIdCounter = 0;
  function nextId() { return taskIdCounter++; }

  const today = new Date();
  const iso = (d) => d.toISOString().slice(0, 10);
  const inDays = (n) => { const d = new Date(); d.setDate(d.getDate() + n); return iso(d); };

  let tasks = [
    { id: nextId(), text: 'Review Q3 roadmap deck', listId: 'work', priority: 'high', due: inDays(1), done: false, createdAt: Date.now() - 5000 },
    { id: nextId(), text: 'Reply to design feedback thread', listId: 'work', priority: 'med', due: inDays(3), done: false, createdAt: Date.now() - 4000 },
    { id: nextId(), text: 'Book dentist appointment', listId: 'personal', priority: 'low', due: '', done: false, createdAt: Date.now() - 3000 },
    { id: nextId(), text: 'Renew gym membership', listId: 'personal', priority: 'med', due: inDays(-2), done: false, createdAt: Date.now() - 2000 },
    { id: nextId(), text: 'Send invoice to client', listId: 'work', priority: 'high', due: inDays(-1), done: true, createdAt: Date.now() - 1000 },
    { id: nextId(), text: 'Plan weekend trip', listId: 'inbox', priority: 'low', due: '', done: false, createdAt: Date.now() },
  ];

  let currentList = 'all';
  let currentPriority = 'all';
  let currentStatus = 'all';
  let currentSort = 'priority';
  let searchQuery = '';
  let editingId = null;

  // ---------- ELEMENTS ----------
  const listsContainer = document.getElementById('lists-container');
  const addListForm = document.getElementById('add-list-form');
  const newListInput = document.getElementById('new-list-input');
  const priorityFilters = document.getElementById('priority-filters');
  const viewTitle = document.getElementById('view-title');
  const taskListEl = document.getElementById('task-list');
  const emptyState = document.getElementById('empty-state');
  const taskForm = document.getElementById('task-form');
  const taskInput = document.getElementById('task-input');
  const taskListSelect = document.getElementById('task-list-select');
  const taskPrioritySelect = document.getElementById('task-priority-select');
  const taskDueInput = document.getElementById('task-due-input');
  const searchInput = document.getElementById('search-input');
  const statusTabs = document.getElementById('status-tabs');
  const sortSelect = document.getElementById('sort-select');
  const ringFg = document.getElementById('ring-fg');
  const ringPct = document.getElementById('ring-pct');
  const statDone = document.getElementById('stat-done');
  const statOpen = document.getElementById('stat-open');
  const clearCompletedBtn = document.getElementById('clear-completed');

  const RING_CIRC = 138.2;
  const priorityRank = { high: 0, med: 1, low: 2 };

  // ---------- RENDER: SIDEBAR LISTS ----------
  function renderLists() {
    listsContainer.innerHTML = '';

    const allRow = document.createElement('div');
    allRow.className = 'list-row' + (currentList === 'all' ? ' active' : '');
    const allCount = tasks.length;
    allRow.innerHTML = `<span class="list-dot" style="background:linear-gradient(135deg,var(--indigo),var(--magenta))"></span><span class="list-name">All tasks</span><span class="list-count">${allCount}</span>`;
    allRow.addEventListener('click', () => { currentList = 'all'; render(); });
    listsContainer.appendChild(allRow);

    lists.forEach(list => {
      const count = tasks.filter(t => t.listId === list.id).length;
      const row = document.createElement('div');
      row.className = 'list-row' + (currentList === list.id ? ' active' : '');
      row.innerHTML = `
        <span class="list-dot" style="background:${list.color}"></span>
        <span class="list-name">${escapeHtml(list.name)}</span>
        <span class="list-count">${count}</span>
        ${list.deletable ? '<button class="list-del" aria-label="Delete list">✕</button>' : ''}
      `;
      row.addEventListener('click', (e) => {
        if (e.target.closest('.list-del')) return;
        currentList = list.id;
        render();
      });
      const delBtn = row.querySelector('.list-del');
      if (delBtn) {
        delBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          deleteList(list.id);
        });
      }
      listsContainer.appendChild(row);
    });
  }

  function deleteList(id) {
    tasks.forEach(t => { if (t.listId === id) t.listId = 'inbox'; });
    lists = lists.filter(l => l.id !== id);
    if (currentList === id) currentList = 'all';
    render();
  }

  addListForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const name = newListInput.value.trim();
    if (!name) return;
    const id = 'list_' + nextId();
    const color = listPalette[listColorIndex % listPalette.length];
    listColorIndex++;
    lists.push({ id, name, color, deletable: true });
    newListInput.value = '';
    render();
  });

  // ---------- RENDER: TASK LIST SELECT (add-task form) ----------
  function renderListSelect() {
    taskListSelect.innerHTML = '';
    lists.forEach(list => {
      const opt = document.createElement('option');
      opt.value = list.id;
      opt.textContent = list.name;
      taskListSelect.appendChild(opt);
    });
    if (currentList !== 'all') taskListSelect.value = currentList;
  }

  // ---------- PRIORITY FILTER BUTTONS ----------
  priorityFilters.querySelectorAll('.pf-row').forEach(btn => {
    btn.addEventListener('click', () => {
      currentPriority = btn.dataset.priority;
      priorityFilters.querySelectorAll('.pf-row').forEach(b => b.classList.toggle('active', b === btn));
      render();
    });
  });

  // ---------- STATUS TABS ----------
  statusTabs.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
      currentStatus = btn.dataset.status;
      statusTabs.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b === btn));
      render();
    });
  });

  sortSelect.addEventListener('change', () => { currentSort = sortSelect.value; render(); });
  searchInput.addEventListener('input', () => { searchQuery = searchInput.value.trim().toLowerCase(); render(); });

  // ---------- ADD TASK ----------
  taskForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const text = taskInput.value.trim();
    if (!text) return;
    tasks.push({
      id: nextId(),
      text,
      listId: taskListSelect.value || 'inbox',
      priority: taskPrioritySelect.value,
      due: taskDueInput.value,
      done: false,
      createdAt: Date.now(),
    });
    taskInput.value = '';
    taskDueInput.value = '';
    taskInput.focus();
    render();
  });

  clearCompletedBtn.addEventListener('click', () => {
    tasks = tasks.filter(t => !t.done);
    render();
  });

  // ---------- HELPERS ----------
  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function listName(id) {
    const l = lists.find(l => l.id === id);
    return l ? l.name : 'Inbox';
  }

  function formatDue(dateStr) {
    if (!dateStr) return null;
    const d = new Date(dateStr + 'T00:00:00');
    const now = new Date();
    now.setHours(0,0,0,0);
    const diff = Math.round((d - now) / (1000 * 60 * 60 * 24));
    const overdue = diff < 0;
    let label;
    if (diff === 0) label = 'Today';
    else if (diff === 1) label = 'Tomorrow';
    else if (diff === -1) label = '1 day overdue';
    else if (overdue) label = `${Math.abs(diff)} days overdue`;
    else label = d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
    return { label, overdue };
  }

  function getFilteredSortedTasks() {
    let result = tasks.slice();

    if (currentList !== 'all') result = result.filter(t => t.listId === currentList);
    if (currentPriority !== 'all') result = result.filter(t => t.priority === currentPriority);
    if (currentStatus === 'active') result = result.filter(t => !t.done);
    if (currentStatus === 'completed') result = result.filter(t => t.done);
    if (searchQuery) result = result.filter(t => t.text.toLowerCase().includes(searchQuery));

    result.sort((a, b) => {
      if (a.done !== b.done) return a.done ? 1 : -1;
      if (currentSort === 'priority') return priorityRank[a.priority] - priorityRank[b.priority];
      if (currentSort === 'due') {
        if (!a.due && !b.due) return 0;
        if (!a.due) return 1;
        if (!b.due) return -1;
        return a.due.localeCompare(b.due);
      }
      if (currentSort === 'alpha') return a.text.localeCompare(b.text);
      if (currentSort === 'newest') return b.createdAt - a.createdAt;
      return 0;
    });

    return result;
  }

  // ---------- RENDER: TASKS ----------
  function renderTasks() {
    const filtered = getFilteredSortedTasks();
    taskListEl.innerHTML = '';

    if (filtered.length === 0) {
      emptyState.style.display = 'block';
    } else {
      emptyState.style.display = 'none';
    }

    filtered.forEach(task => {
      const li = document.createElement('div');
      li.className = `task p-${task.priority}` + (task.done ? ' done' : '');

      const check = document.createElement('button');
      check.className = 'task-check' + (task.done ? ' checked' : '');
      check.setAttribute('aria-label', task.done ? 'Mark as not done' : 'Mark as done');
      check.innerHTML = '<svg viewBox="0 0 22 22"><polyline points="5,11 9,15 17,6"/></svg>';
      check.addEventListener('click', () => { task.done = !task.done; render(); });

      const body = document.createElement('div');
      body.className = 'task-body';

      const textEl = document.createElement('div');
      if (editingId === task.id) {
        const inputEl = document.createElement('input');
        inputEl.type = 'text';
        inputEl.className = 'task-text-input';
        inputEl.value = task.text;
        inputEl.maxLength = 200;
        textEl.appendChild(inputEl);
        setTimeout(() => { inputEl.focus(); inputEl.select(); }, 0);

        const commit = () => {
          const v = inputEl.value.trim();
          if (v) task.text = v;
          editingId = null;
          render();
        };
        inputEl.addEventListener('blur', commit);
        inputEl.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') { e.preventDefault(); commit(); }
          if (e.key === 'Escape') { editingId = null; render(); }
        });
      } else {
        textEl.className = 'task-text';
        textEl.textContent = task.text;
        textEl.addEventListener('dblclick', () => { editingId = task.id; render(); });
      }
      body.appendChild(textEl);

      const meta = document.createElement('div');
      meta.className = 'task-meta';

      const list = lists.find(l => l.id === task.listId);
      const listChip = document.createElement('span');
      listChip.className = 'chip chip-list';
      listChip.innerHTML = `<span style="width:6px;height:6px;border-radius:50%;background:${list ? list.color : '#5B5FEF'};display:inline-block;"></span>${escapeHtml(listName(task.listId))}`;
      meta.appendChild(listChip);

      const prioChip = document.createElement('span');
      prioChip.className = `chip chip-priority-${task.priority}`;
      prioChip.textContent = task.priority === 'high' ? 'High' : task.priority === 'med' ? 'Medium' : 'Low';
      meta.appendChild(prioChip);

      const dueInfo = formatDue(task.due);
      if (dueInfo) {
        const dueChip = document.createElement('span');
        dueChip.className = 'chip ' + (dueInfo.overdue && !task.done ? 'chip-overdue' : 'chip-due');
        dueChip.textContent = dueInfo.label;
        meta.appendChild(dueChip);
      }

      body.appendChild(meta);

      const actions = document.createElement('div');
      actions.className = 'task-actions';

      const editBtn = document.createElement('button');
      editBtn.className = 'icon-btn';
      editBtn.setAttribute('aria-label', 'Edit task');
      editBtn.textContent = '✎';
      editBtn.addEventListener('click', () => { editingId = task.id; render(); });

      const delBtn = document.createElement('button');
      delBtn.className = 'icon-btn delete';
      delBtn.setAttribute('aria-label', 'Delete task');
      delBtn.textContent = '✕';
      delBtn.addEventListener('click', () => { tasks = tasks.filter(t => t.id !== task.id); render(); });

      actions.appendChild(editBtn);
      actions.appendChild(delBtn);

      li.appendChild(check);
      li.appendChild(body);
      li.appendChild(actions);
      taskListEl.appendChild(li);
    });
  }

  // ---------- RENDER: STATS ----------
  function renderStats() {
    const scoped = currentList === 'all' ? tasks : tasks.filter(t => t.listId === currentList);
    const total = scoped.length;
    const done = scoped.filter(t => t.done).length;
    const pct = total === 0 ? 0 : Math.round((done / total) * 100);

    const offset = RING_CIRC - (pct / 100) * RING_CIRC;
    ringFg.style.strokeDashoffset = offset;
    ringPct.textContent = pct + '%';
    statDone.textContent = `${done} of ${total} done`;
    statOpen.textContent = `${total - done} open`;

    clearCompletedBtn.disabled = !tasks.some(t => t.done);
  }

  function renderTitle() {
    if (currentList === 'all') { viewTitle.textContent = 'All tasks'; return; }
    viewTitle.textContent = listName(currentList);
  }

  // ---------- MASTER RENDER ----------
  function render() {
    renderLists();
    renderListSelect();
    renderTitle();
    renderTasks();
    renderStats();
  }

  render();
</script>

</body>
</html>
